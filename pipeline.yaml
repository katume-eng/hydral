pipeline:
  name: "hydral_default"
  input: "/mnt/c/hydral/data/raw/hydral/"
  output: "/mnt/c/hydral/data/processed/hydral"
  glob:
    - "**/*.wav"
    - "**/*.mp3"
    - "**/*.flac"
    - "**/*.m4a"
  steps:
    - name: ensure_metadata
      enabled: true
    - name: analyze
      enabled: true
      params:
        sr: 22050
        hop_length: 512
        smoothing_window: 5
    - name: normalize
      enabled: true
      params:
        target_db: -1.0
    - name: band_split
      enabled: false
      params:
        # Uses 5 default frequency bands (20-120, 120-300, 300-900, 900-3000, 3000-12000 Hz)
        filter_order: 5
    - name: grain
      enabled: false
      params:
        grain_sec: 0.5
        seed: 42
    - name: splash
      enabled: true
      params:
        hop_length: 256        # frame hop size in samples
        smooth_window: 5       # moving-average smoothing window (frames)
        energy_threshold_std: 2.0   # energy gate: mean + k*std
        onset_threshold_std: 1.5    # onset gate: mean + k*std
        min_interval_sec: 0.12      # refractory period between events (s)
